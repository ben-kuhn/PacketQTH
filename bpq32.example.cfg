; LinBPQ Configuration Example for PacketQTH
; Add these entries to your bpq32.cfg file

; In the telnet port definition, add PacketQTH's port to CMDPORT:
CMDPORT 8023

; In the main section with other APPLICATION lines:
APPLICATION 4,PQTH,C 1 HOST 0 S

; Explanation:
; - CMDPORT 8023: Defines HOST 0 as port 8023
;   (add more ports separated by spaces for additional hosts)
; - APPLICATION 4,PQTH: Application index 4, named "PQTH"
;   (indexes 1-3 are often used by built-in services)
; - C 1: Connect telnet port 1 to this application
;   (adjust to match your telnet port number)
; - HOST 0: Connect to the first CMDPORT entry (index 0 = port 8023)
; - S: Return to node on disconnect

; Usage:
; Users connect by typing: PQTH

; The application automatically sends the user's callsign to PacketQTH
; PacketQTH then prompts for the TOTP code

; Example session:
;   C KN4XYZ-5
;   Connected to KN4XYZ-5
;   *** Connected to BPQ
;   BPQ> PQTH
;
;   PacketQTH v0.1.0
;   TOTP Code: 123456
;
;   Welcome KN4XYZ!
;   Type H for help
;
;   >
